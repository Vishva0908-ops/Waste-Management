<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WasteWise</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #39ff14;
    --dark: #0d0d0d;
    --mid: #1a1a1a;
    --card: #141414;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
  }
  .logo span { color: var(--green); }

  .tagline {
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  /* Upload zone */
  .upload-zone {
    aspect-ratio: 4/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }
  .upload-zone:hover { background: rgba(57,255,20,0.03); }
  .upload-zone.drag-over { background: rgba(57,255,20,0.07); border-color: var(--green); }

  .upload-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  .upload-text {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }
  .upload-text strong { color: var(--green); }

  #preview {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    background: #000;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .btn-secondary {
    flex: 1;
    padding: 14px;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-secondary:last-child { border-right: none; }
  .btn-secondary:hover { color: var(--text); background: rgba(255,255,255,0.03); }

  .btn-classify {
    width: 100%;
    padding: 20px;
    background: var(--green);
    border: none;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-classify:hover { background: #fff; }
  .btn-classify:active { transform: scale(0.99); }
  .btn-classify:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
  }

  /* Results */
  .results {
    display: none;
    padding: 24px;
    border-top: 1px solid var(--border);
  }
  .results.show { display: block; }

  .result-label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .result-primary {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--green);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .result-confidence {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .result-tip {
    background: rgba(57,255,20,0.05);
    border-left: 3px solid var(--green);
    padding: 12px 16px;
    font-size: 0.75rem;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* Bar chart */
  .bars { display: flex; flex-direction: column; gap: 8px; }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 44px;
    align-items: center;
    gap: 10px;
    font-size: 0.65rem;
  }
  .bar-name { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 0%;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .bar-pct { color: var(--muted); text-align: right; font-size: 0.6rem; }

  /* Status */
  .status {
    padding: 16px 24px;
    font-size: 0.7rem;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status.error { color: #ff4444; border-top: 1px solid var(--border); }
  .status.loading { color: var(--green); border-top: 1px solid var(--border); }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  input[type="file"] { display: none; }

  /* Emoji icons for categories */
  .cat-icon { font-size: 1.5rem; }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .results.show { animation: fadeUp 0.3s ease; }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Waste<span>Wise</span></div>
    <div class="tagline">// Upload an image → AI classifies your waste instantly</div>
  </header>

  <div class="card">

    <div class="upload-zone" id="uploadZone">
      <img id="preview" alt="Preview"/>
      <div id="placeholder">
        <div class="upload-icon">🗂️</div>
        <div class="upload-text">
          <strong>Click to upload</strong> or drag & drop<br/>
          JPG, PNG, WEBP supported
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-secondary" id="changeBtn">↩ Change Image</button>
      <button class="btn-secondary" id="cameraBtn">📷 Camera</button>
    </div>

    <button class="btn-classify" id="classifyBtn" disabled>
      ⚡ CLASSIFY WASTE
    </button>

    <div id="statusMsg"></div>
    <div class="results" id="results"></div>

  </div>

  <footer>WASTEWISE v1.0 &nbsp;·&nbsp; POWERED BY TEACHABLE MACHINE</footer>
</div>

<input type="file" id="fileInput" accept="image/*"/>
<video id="camVideo" style="display:none" autoplay playsinline></video>
<canvas id="camCanvas" style="display:none"></canvas>

<script>
const MODEL_URL = 'https://storage.googleapis.com/tm-model/VzfkCUJaH/';

const TIPS = {
  default: 'Check your local waste disposal guidelines for the correct bin.'
};

const ICONS = {
  default: '🗑️'
};

// Category-specific tips & icons — filled after model loads
const categoryMeta = {};

let model, maxPredictions;
let imageLoaded = false;

const uploadZone = document.getElementById('uploadZone');
const placeholder = document.getElementById('placeholder');
const preview = document.getElementById('preview');
const fileInput = document.getElementById('fileInput');
const classifyBtn = document.getElementById('classifyBtn');
const changeBtn = document.getElementById('changeBtn');
const cameraBtn = document.getElementById('cameraBtn');
const results = document.getElementById('results');
const statusMsg = document.getElementById('statusMsg');

// ── Model load ──────────────────────────────────────────────
async function loadModel() {
  setStatus('loading', 'Loading model…');
  try {
    const modelURL  = MODEL_URL + 'model.json';
    const metaURL   = MODEL_URL + 'metadata.json';
    model = await tmImage.load(modelURL, metaURL);
    maxPredictions = model.getTotalClasses();
    setStatus('');
    if (imageLoaded) classifyBtn.disabled = false;
  } catch(e) {
    setStatus('error', 'Model load failed — check your connection.');
    console.error(e);
  }
}

function setStatus(type, msg) {
  if (!msg) { statusMsg.innerHTML = ''; return; }
  statusMsg.innerHTML = `<div class="status ${type}">${type==='loading'?'<div class="dot"></div>':type==='error'?'✗':''} ${msg}</div>`;
}

// ── Image handling ──────────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
changeBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    preview.src = ev.target.result;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    imageLoaded = true;
    results.classList.remove('show');
    if (model) classifyBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

// ── Camera ──────────────────────────────────────────────────
cameraBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video = document.getElementById('camVideo');
    const canvas = document.getElementById('camCanvas');
    video.srcObject = stream;
    await video.play();
    setTimeout(() => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      preview.src = canvas.toDataURL('image/jpeg');
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      imageLoaded = true;
      results.classList.remove('show');
      if (model) classifyBtn.disabled = false;
      stream.getTracks().forEach(t => t.stop());
    }, 800);
  } catch(e) {
    setStatus('error', 'Camera access denied.');
  }
});

// ── Classify ─────────────────────────────────────────────────
classifyBtn.addEventListener('click', async () => {
  if (!model || !imageLoaded) return;
  classifyBtn.disabled = true;
  classifyBtn.innerHTML = '<div class="dot" style="background:#000"></div> ANALYZING…';
  results.classList.remove('show');

  try {
    const predictions = await model.predict(preview);
    predictions.sort((a, b) => b.probability - a.probability);
    showResults(predictions);
  } catch(e) {
    setStatus('error', 'Classification failed. Try another image.');
    console.error(e);
  } finally {
    classifyBtn.disabled = false;
    classifyBtn.innerHTML = '⚡ CLASSIFY WASTE';
  }
});

function getCategoryMeta(name) {
  const n = name.toLowerCase();
  if (n.includes('organic') || n.includes('compost') || n.includes('food') || n.includes('bio'))
    return { icon: '🍃', tip: 'This is organic/compostable waste. Add it to your green bin or compost heap. Great for making garden fertilizer!' };
  if (n.includes('recycle') || n.includes('plastic') || n.includes('glass') || n.includes('metal') || n.includes('paper') || n.includes('cardboard'))
    return { icon: '♻️', tip: 'This item is recyclable! Rinse it clean, remove lids, and place it in your blue/recycling bin.' };
  if (n.includes('hazard') || n.includes('electronic') || n.includes('battery') || n.includes('chemical') || n.includes('e-waste'))
    return { icon: '⚠️', tip: 'Hazardous or e-waste! Do NOT put this in regular bins. Take it to a certified disposal or collection point.' };
  if (n.includes('landfill') || n.includes('general') || n.includes('trash') || n.includes('garbage') || n.includes('non'))
    return { icon: '🗑️', tip: 'This belongs in general waste / landfill bin. Try to reduce use of such items where possible.' };
  return { icon: '🔍', tip: 'Check your local waste disposal guidelines for how to dispose of this item correctly.' };
}

function showResults(predictions) {
  const top = predictions[0];
  const meta = getCategoryMeta(top.className);
  const pct = (top.probability * 100).toFixed(1);

  const barsHtml = predictions.map(p => {
    const w = (p.probability * 100).toFixed(1);
    return `
      <div class="bar-row">
        <div class="bar-name">${p.className}</div>
        <div class="bar-track"><div class="bar-fill" data-w="${w}"></div></div>
        <div class="bar-pct">${w}%</div>
      </div>`;
  }).join('');

  results.innerHTML = `
    <div class="result-label">// Classification Result</div>
    <div class="result-primary"><span class="cat-icon">${meta.icon}</span>${top.className}</div>
    <div class="result-confidence">Confidence: ${pct}%</div>
    <div class="result-tip">${meta.tip}</div>
    <div class="result-label" style="margin-bottom:12px">// All Classes</div>
    <div class="bars">${barsHtml}</div>
  `;
  results.classList.add('show');

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 50);
}

// ── Init ─────────────────────────────────────────────────────
loadModel();
</script>
</body>
</html>
